<script>
async function initDashboard() {
  try {
    const [signalRows, scoreRows] = await Promise.all([
      fetchRows(SIGNAL_GVIZ_URL),
      fetchRows(SCORE_GVIZ_URL)
    ]);

    console.log(
      "SIGNAL ROWS",
      signalRows.map((row, index) => ({
        index: index,
        colA: getCell(signalRows, index, 0),
        colB: getCell(signalRows, index, 1)
      }))
    );

    renderSignalGrid(signalRows);
    renderGauge(scoreRows);
    renderFinalScore(scoreRows);
  } catch (error) {
    console.error("Dashboard load error:", error);

    document.getElementById("gauge-score").textContent = "--";
    document.getElementById("gauge-signal").textContent = "--";
    document.getElementById("gauge-label").textContent = "Data load failed";

    document.getElementById("signal-grid").innerHTML = `
      <div class="signal-card red">
        <div class="signal-name">Data Error</div>
        <div class="signal-emoji">⚠️</div>
      </div>
    `;
  }
}
</script>
