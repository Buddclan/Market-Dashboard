<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stagflation Monitor</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px;
    }

    .section {
      background: #0f0f0f;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .summary-box {
      background: #121212;
      border: 1px solid #232323;
      border-radius: 10px;
      padding: 16px;
    }

    .signal {
      font-size: 42px;
      text-align: center;
      margin-top: 10px;
    }

    .widget-grid {
      display: grid;
      grid-template-columns: 560px 1fr;
      gap: 20px;
    }

    .widget-box {
      background: #121212;
      border: 1px solid #232323;
      border-radius: 10px;
      padding: 16px;
    }

    .footer {
      text-align: center;
      color: #7f7f7f;
      padding: 20px;
    }
  </style>
</head>

<body>

<!-- TOP TICKER -->
<script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
<tv-ticker-tape
  symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,CMCMARKETS:GOLD,NASDAQ:TSLA,NASDAQ:NVDA,NASDAQ:MSFT"
  theme="dark">
</tv-ticker-tape>

<div class="container">

  <div class="section">
    <h1>📊 Stagflation Monitor</h1>
  </div>

  <!-- LIVE SIGNAL SUMMARY -->
  <div class="section">
    <h2>Signal Summary</h2>

    <div class="summary-grid">
      <div class="summary-box"><h3>Labor</h3><div id="sig-labor" class="signal">...</div></div>
      <div class="summary-box"><h3>Consumer</h3><div id="sig-consumer" class="signal">...</div></div>
      <div class="summary-box"><h3>Housing</h3><div id="sig-housing" class="signal">...</div></div>
      <div class="summary-box"><h3>Manufacturing</h3><div id="sig-manufacturing" class="signal">...</div></div>
      <div class="summary-box"><h3>Inflation</h3><div id="sig-inflation" class="signal">...</div></div>
      <div class="summary-box"><h3>Liquidity</h3><div id="sig-liquidity" class="signal">...</div></div>
      <div class="summary-box"><h3>Trade</h3><div id="sig-trade" class="signal">...</div></div>
      <div class="summary-box"><h3>Financial</h3><div id="sig-financial" class="signal">...</div></div>
    </div>
  </div>

  <!-- YIELDS -->
  <div class="section widget-grid">

    <div class="widget-box">
      <h2>Yield Monitor</h2>

      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
        {
          "colorTheme": "dark",
          "symbolsGroups": [{
            "name": "Bonds",
            "symbols": [
              {"name":"TVC:US10Y"},
              {"name":"TVC:US02Y"},
              {"name":"TVC:US30Y"}
            ]
          }]
        }
        </script>
      </div>
    </div>

    <div class="widget-box">
      <h2>Market Signals</h2>
      <p style="color:#888;">(Next step – plug your WEBData widgets here)</p>
    </div>

  </div>

</div>

<!-- LIVE DATA SCRIPT -->
<script>
const SHEET_ID = "1p0oEpOFIF5fY-3sJJTgRWLMkjMT2i6uNMRtFR-g9y44";
const GID = "441516074";

const map = {
  "labor_signal": "sig-labor",
  "consumer_signal": "sig-consumer",
  "housing_signal": "sig-housing",
  "manufacturing_signal": "sig-manufacturing",
  "inflation_signal": "sig-inflation",
  "liquidity_signal": "sig-liquidity",
  "trade_signal": "sig-trade",
  "financial_signal": "sig-financial"
};

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&tqx=out:json`)
.then(res => res.text())
.then(data => {
  const json = JSON.parse(data.substring(47).slice(0,-2));
  const rows = json.table.rows;

  rows.forEach(r => {
    const key = r.c[0]?.v?.toLowerCase().trim();
    const val = r.c[1]?.v;

    if(map[key]) {
      document.getElementById(map[key]).innerHTML = val;
    }
  });
})
.catch(err => console.error(err));
</script>

</body>
</html>
