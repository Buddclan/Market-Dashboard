<section style="background:#000; padding:20px;">

  <h2 style="color:#fff; margin-bottom:12px;">Signal Summary</h2>

  <div id="signal-grid" style="
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
  ">
    <div style="color:#fff;">Loading...</div>
  </div>

</section>

<script>
async function loadSignals() {

  const SHEET_ID = "1p0oEpOFIF5fY-3sJJTgRWLMkjMT2i6uNMRtFR-g9y44";
  const SHEET_NAME = "stagflation_monitor";

  const grid = document.getElementById("signal-grid");

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}&range=B1:B12&tqx=out:json`;

  try {
    const res = await fetch(url);
    const text = await res.text();

    const json = JSON.parse(text.substring(47).slice(0,-2));

    const rows = json.table.rows;

    grid.innerHTML = "";

    rows.forEach(r => {
      if (!r.c || !r.c[0]) return;

      const value = r.c[0].v || "";
      const parts = value.split("\n");

      const name = parts[0] || "";
      const emoji = parts[1] || "";

      const card = document.createElement("div");

      card.style = `
        background:#000;
        border:1px solid #111;
        border-radius:10px;
        height:90px;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
      `;

      card.innerHTML = `
        <div style="color:#fff; font-size:14px; margin-bottom:6px; text-align:center;">
          ${name}
        </div>
        <div style="font-size:26px;">
          ${emoji}
        </div>
      `;

      grid.appendChild(card);
    });

  } catch (err) {
    grid.innerHTML = "<div style='color:red;'>Error loading</div>";
    console.error(err);
  }
}

loadSignals();
</script>
