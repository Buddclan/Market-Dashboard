<section class="signal-summary">
  <h2 class="signal-title">Signal Summary</h2>

  <div id="signal-grid" class="signal-grid">
    <div class="signal-card">Loading...</div>
  </div>
</section>

<style>
  .signal-summary {
    margin: 20px 0 30px;
    width: 100%;
  }

  .signal-title {
    color: #ffffff;
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .signal-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .signal-card {
    background: #000000;
    border: 1px solid #1a1a1a;
    border-radius: 12px;
    height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .signal-name {
    color: #ffffff;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 6px;
    text-align: center;
  }

  .signal-emoji {
    font-size: 1.8rem;
  }

  @media (max-width: 900px) {
    .signal-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>

<script>
  async function loadSignals() {
    const SHEET_ID = "1p0oEpOFIF5fY-3sJJTgRWLMkjMT2i6uNMRtFR-g9y44";
    const SHEET_NAME = "stagflation_monitor";
    const grid = document.getElementById("signal-grid");

    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}&range=B1:B12&tqx=out:json`;

    try {
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));

      const rows = json.table.rows;

      grid.innerHTML = "";

      rows.forEach(r => {
        if (!r.c || !r.c[0]) return;

        const value = r.c[0].v || "";
        const parts = value.split("\n");

        const name = parts[0] || "";
        const emoji = parts[1] || "";

        const card = document.createElement("div");
        card.className = "signal-card";

        card.innerHTML = `
          <div class="signal-name">${name}</div>
          <div class="signal-emoji">${emoji}</div>
        `;

        grid.appendChild(card);
      });

    } catch (e) {
      grid.innerHTML = "<div class='signal-card'>Error loading</div>";
      console.error(e);
    }
  }

  loadSignals();
</script>
