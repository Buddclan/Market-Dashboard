<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Macro Dashboard</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1400px;
      margin: auto;
      padding: 20px;
    }

    .header {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #222;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px 0;
    }

    .sheet-frame {
      width: 100%;
      height: 900px;
      border: none;
      border-radius: 10px;
      background: white;
    }
  </style>
</head>

<body>

  <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
  <tv-ticker-tape symbols="TVC:US10Y,TVC:US30Y,TVC:US02Y,TVC:VIX,IG:NASDAQ,TVC:DJI,SP:SPX,TVC:DXY,GOLD"></tv-ticker-tape>

  <div class="container">

    <div class="header">
      <h1>📊 Stagflation Monitor</h1>
      <p>Live macro dashboard tracking inflation, labor, liquidity, and market stress.</p>
    </div>

    <iframe
      class="sheet-frame"
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTIduv9T5FOzYQZOrLJPRUO2ffR6Is0VMfdlEUXcMIeg3mDq-LyjRlDEi72pUutCcmdM5tYXu4Ck5AB/pubhtml?widget=true&headers=false"
      allowfullscreen>
    </iframe>

  </div>

</body>
</html>
