<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stagflation Monitor</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000000;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1550px;
      margin: 0 auto;
      padding: 18px;
    }

    .section {
      background: #000000;
      border: 1px solid #111111;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .hero {
      padding: 20px 18px;
    }

    .hero h1 {
      margin-bottom: 8px;
      font-size: 30px;
      color: #ffffff;
    }

    .hero p {
      margin: 0;
      color: #9a9a9a;
      font-size: 14px;
      line-height: 1.5;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      margin: 0;
      font-size: 22px;
      color: #ffffff;
      white-space: nowrap;
    }

    .divider-line {
      height: 2px;
      flex: 1;
      border-radius: 999px;
      opacity: 0.95;
    }

    .divider-line.gold {
      background: linear-gradient(90deg, rgba(255,215,0,0.05) 0%, rgba(255,215,0,0.95) 50%, rgba(255,215,0,0.05) 100%);
      box-shadow: 0 0 10px rgba(255,215,0,0.28);
    }

    .divider-line.silver {
      background: linear-gradient(90deg, rgba(192,192,192,0.05) 0%, rgba(214,214,214,0.95) 50%, rgba(192,192,192,0.05) 100%);
      box-shadow: 0 0 10px rgba(210,210,210,0.22);
    }

    .divider-line.energy {
      background: linear-gradient(90deg, rgba(255,120,0,0.05) 0%, rgba(255,120,0,0.95) 50%, rgba(255,120,0,0.05) 100%);
      box-shadow: 0 0 10px rgba(255,120,0,0.24);
    }

    .signal-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .signal-card {
      background: #000000;
      border: 1px solid #141414;
      border-radius: 12px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 12px 10px;
      text-align: center;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .signal-card:hover {
      transform: translateY(-1px);
      border-color: #242424;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    .signal-name {
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .signal-emoji {
      font-size: 28px;
      line-height: 1;
    }

    .signal-empty {
      color: #666666;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .signal-card.green {
      border-color: rgba(0, 255, 120, 0.22);
      box-shadow: 0 0 12px rgba(0, 255, 120, 0.06);
    }

    .signal-card.yellow {
      border-color: rgba(255, 220, 0, 0.24);
      box-shadow: 0 0 12px rgba(255, 220, 0, 0.06);
    }

    .signal-card.orange {
      border-color: rgba(255, 145, 0, 0.24);
      box-shadow: 0 0 12px rgba(255, 145, 0, 0.07);
    }

    .signal-card.red {
      border-color: rgba(255, 60, 60, 0.24);
      box-shadow: 0 0 12px rgba(255, 60, 60, 0.07);
    }

    .signal-card.skull {
      border-color: rgba(220, 220, 220, 0.18);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.04);
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
    }

    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .panel {
      background: #000000;
      border: 1px solid #111111;
      border-radius: 14px;
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 14px 0;
      font-size: 22px;
      color: #ffffff;
    }

    .market-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .energy-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-widget {
      background: #000000;
      border: 1px solid #141414;
      border-radius: 12px;
      padding: 10px;
      min-height: 120px;
    }

    .mini-widget-label {
      font-size: 12px;
      color: #b0b0b0;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .tradingview-widget-container {
      width: 100%;
    }

    .footer {
      text-align: center;
      color: #6f6f6f;
      font-size: 12px;
      padding: 4px 0 24px;
      letter-spacing: 0.04em;
    }

    @media (max-width: 1200px) {
      .top-grid {
        grid-template-columns: 1fr;
      }

      .signal-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .energy-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 780px) {
      .signal-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .market-grid,
      .energy-grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 26px;
      }
    }

    @media (max-width: 520px) {
      .signal-grid {
        grid-template-columns: 1fr;
      }

      .section-header {
        gap: 10px;
      }

      .section-header h2 {
        font-size: 18px;
      }
    }
  </style>
</head>

  <script>
    <script>
  async function loadSignals() {
    const SHEET_ID = "1p0oEpOFIF5fY-3sJJTgRWLMkjMT2i6uNMRtFR-g9y44";
    const SHEET_NAME = "Stagflation_monitor";
    const RANGE = "B1:B12";
    const grid = document.getElementById("signal-grid");

      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&range=${encodeURIComponent(RANGE)}&tqx=out:json`;

      function getSignalClass(emoji) {
        if (emoji === "🟢") return "green";
        if (emoji === "🟡") return "yellow";
        if (emoji === "🟠") return "orange";
        if (emoji === "🔴") return "red";
        if (emoji === "☠️" || emoji === "☠") return "skull";
        return "";
      }

      try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        const rows = json.table.rows || [];

        grid.innerHTML = "";

        rows.forEach(r => {
          if (!r.c || !r.c[0]) return;

          const value = String(r.c[0].v || "").trim();
          if (!value) return;

          const parts = value.split("\n");
          const name = (parts[0] || "").trim();
          const emoji = (parts[1] || "").trim();
          const signalClass = getSignalClass(emoji);

          const card = document.createElement("div");
          card.className = `signal-card ${signalClass}`;

          card.innerHTML = `
            <div class="signal-name">${name}</div>
            <div class="${emoji ? 'signal-emoji' : 'signal-empty'}">${emoji || 'No Signal'}</div>
          `;

          grid.appendChild(card);
        });

        if (!grid.innerHTML.trim()) {
          grid.innerHTML = `
            <div class="signal-card">
              <div class="signal-name">No Data</div>
              <div class="signal-empty">Check Sheet</div>
            </div>
          `;
        }

      } catch (err) {
        console.error("Signal load error:", err);
        grid.innerHTML = `
          <div class="signal-card">
            <div class="signal-name">Load Error</div>
            <div class="signal-empty">Retry</div>
          </div>
        `;
      }
    }

    loadSignals();
  </script>
