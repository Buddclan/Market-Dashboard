<section class="signal-summary-section">
  <h2 class="signal-summary-title">Signal Summary</h2>
  <div id="signal-summary-grid" class="signal-summary-grid">
    <div class="signal-card loading">Loading...</div>
  </div>
</section>

<style>
  .signal-summary-section {
    margin: 28px 0;
  }

  .signal-summary-title {
    color: #ffffff;
    font-size: 2rem;
    font-weight: 700;
    margin: 0 0 18px 0;
  }

  .signal-summary-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(220px, 1fr));
    gap: 16px;
  }

  .signal-card {
    background: #0f0f0f;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    min-height: 130px;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
  }

  .signal-card.loading,
  .signal-card.error {
    color: #d0d0d0;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }

  .signal-name {
    color: #ffffff;
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .signal-emoji {
    font-size: 2.25rem;
    line-height: 1;
    text-align: center;
    margin-top: auto;
  }

  @media (max-width: 1200px) {
    .signal-summary-grid {
      grid-template-columns: repeat(3, minmax(220px, 1fr));
    }
  }

  @media (max-width: 900px) {
    .signal-summary-grid {
      grid-template-columns: repeat(2, minmax(220px, 1fr));
    }
  }

  @media (max-width: 560px) {
    .signal-summary-grid {
      grid-template-columns: 1fr;
    }

    .signal-name {
      font-size: 1.6rem;
    }

    .signal-emoji {
      font-size: 2rem;
    }
  }
</style>

<script>
  async function loadSignalSummary() {
    const SHEET_ID = "1p0oEpOFIF5fY-3sJJTgRWLMkjMT2i6uNMRtFR-g9y44";
    const SHEET_NAME = "stagflation_monitor";
    const grid = document.getElementById("signal-summary-grid");

    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&range=B1:B12&tqx=out:json`;

    try {
      const response = await fetch(url);
      const text = await response.text();

      const jsonText = text.substring(47, text.length - 2);
      const data = JSON.parse(jsonText);

      const rows = (data.table.rows || [])
        .map(row => row.c && row.c[0] && row.c[0].v ? String(row.c[0].v).trim() : "")
        .filter(Boolean);

      if (!rows.length) {
        grid.innerHTML = '<div class="signal-card error">No signal data found.</div>';
        return;
      }

      grid.innerHTML = "";

      rows.forEach(item => {
        const parts = item.split("\n");
        const name = (parts[0] || "").trim();
        const emoji = (parts[1] || "").trim();

        const card = document.createElement("div");
        card.className = "signal-card";

        card.innerHTML = `
          <div class="signal-name">${name}</div>
          <div class="signal-emoji">${emoji || "&nbsp;"}</div>
        `;

        grid.appendChild(card);
      });
    } catch (error) {
      console.error("Signal Summary load error:", error);
      grid.innerHTML = '<div class="signal-card error">Unable to load signal summary.</div>';
    }
  }

  loadSignalSummary();
</script>
