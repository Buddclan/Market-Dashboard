<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Macro Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050505;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: #050505;
    }

    .ticker-wrap {
      width: 100%;
      min-height: 60px;
      border-bottom: 1px solid #1f1f1f;
      background: #000;
    }

    .section {
      width: 100%;
      padding: 14px;
      border-bottom: 1px solid #151515;
    }

    .section-title {
      margin: 0 0 12px 0;
      font-size: 22px;
      font-weight: 700;
      color: #f5f5f5;
    }

    .sub-title {
      margin: 0 0 10px 0;
      font-size: 18px;
      font-weight: 700;
      color: #f0c040;
    }

    .dashboard-frame {
      width: 100%;
      height: 950px;
      border: none;
      background: #000;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: #0b0b0b;
      border: 1px solid #1d1d1d;
      border-radius: 10px;
      padding: 10px;
      min-height: 420px;
      overflow: hidden;
    }

    .card.tall {
      min-height: 560px;
    }

    .widget-fill {
      width: 100%;
      height: 100%;
    }

    .widget-box {
      width: 100%;
      min-height: 100%;
    }

    .news-card {
      background: #0b0b0b;
      border: 1px solid #1d1d1d;
      border-radius: 10px;
      padding: 10px;
      min-height: 620px;
      overflow: hidden;
    }

    .footer-space {
      height: 20px;
    }

    @media (max-width: 980px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .dashboard-frame {
        height: 820px;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- TOP TICKER -->
    <div class="ticker-wrap">
      <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
      <tv-ticker-tape
        symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,COMEX:GOLD"
        theme="dark">
      </tv-ticker-tape>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="section">
      <h1 class="section-title">Macro Dashboard</h1>
      <iframe
        class="dashboard-frame"
        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTlduv9T5F0zYOZ0rLJPRU02ffR6Is0VMfLdEUXcMIeg3mDq-Ly1RLDE172pUutCcmdM5tYXu4CK5AB/pubhtml?gid=1019546511&single=true&widget=true&headers=false">
      </iframe>
    </div>

    <!-- MARKET HEATMAPS -->
    <div class="section">
      <h2 class="section-title">Market Heatmaps</h2>
      <div class="grid-2">

        <div class="card tall">
          <div class="sub-title">Stock Heatmap</div>
          <div class="tradingview-widget-container widget-fill">
            <div class="tradingview-widget-container__widget widget-box"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
            {
              "dataSource": "SPX500",
              "blockSize": "market_cap_basic",
              "blockColor": "change",
              "grouping": "sector",
              "locale": "en",
              "symbolUrl": "",
              "colorTheme": "dark",
              "exchanges": [],
              "hasTopBar": false,
              "isDataSetEnabled": false,
              "isZoomEnabled": true,
              "hasSymbolTooltip": true,
              "isMonoSize": false,
              "width": "100%",
              "height": "520"
            }
            </script>
          </div>
        </div>

        <div class="card tall">
          <div class="sub-title">Crypto Heatmap</div>
          <div class="tradingview-widget-container widget-fill">
            <div class="tradingview-widget-container__widget widget-box"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js" async>
            {
              "dataSource": "Crypto",
              "blockSize": "market_cap_calc",
              "blockColor": "24h_close_change|5",
              "locale": "en",
              "symbolUrl": "",
              "colorTheme": "dark",
              "hasTopBar": false,
              "isDataSetEnabled": false,
              "isZoomEnabled": true,
              "hasSymbolTooltip": true,
              "isMonoSize": false,
              "width": "100%",
              "height": "520"
            }
            </script>
          </div>
        </div>

      </div>
    </div>

    <!-- GLOBAL / MACRO -->
    <div class="section">
      <h2 class="section-title">Global Macro</h2>
      <div class="grid-2">

        <div class="card">
          <div class="sub-title">Forex Heatmap</div>
          <div class="tradingview-widget-container widget-fill">
            <div class="tradingview-widget-container__widget widget-box"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-forex-heat-map.js" async>
            {
              "colorTheme": "dark",
              "isTransparent": false,
              "locale": "en",
              "currencies": [
                "EUR",
                "USD",
                "JPY",
                "GBP",
                "CHF",
                "AUD",
                "CAD",
                "NZD",
                "CNY"
              ],
              "backgroundColor": "#0F0F0F",
              "width": "100%",
              "height": 420
            }
            </script>
          </div>
        </div>

        <div class="card">
          <div class="sub-title">Economic Map</div>
          <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-economic-map.js"></script>
          <tv-economic-map></tv-economic-map>
        </div>

      </div>
    </div>

    <!-- NEWS -->
    <div class="section">
      <h2 class="section-title">Market News</h2>
      <div class="news-card">
        <div class="tradingview-widget-container widget-fill">
          <div class="tradingview-widget-container__widget widget-box"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
          {
            "displayMode": "regular",
            "feedMode": "all_symbols",
            "colorTheme": "dark",
            "isTransparent": false,
            "locale": "en",
            "width": "100%",
            "height": 580
          }
          </script>
        </div>
      </div>
    </div>

    <div class="footer-space"></div>
  </div>
</body>
</html>
