<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Macro Dashboard</title>
  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .ticker-wrap {
      width: 100%;
      min-height: 60px;
      border-bottom: 1px solid #1f1f1f;
      background: #000;
    }

    .sheet-wrap {
      padding: 10px;
    }

    iframe {
      width: 100%;
      height: 1000px;
      border: none;
      background: #000;
    }
  </style>
</head>
<body>

  <div class="ticker-wrap">
    <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
    <tv-ticker-tape
      symbols="FOREXCOM:SPXUSD,FOREXCOM:DJI,FX:EURUSD,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,COMEX:GOLD"
      theme="dark">
    </tv-ticker-tape>
  </div>

  <div class="sheet-wrap">
    <iframe
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTIduv9T5FOzYQZOrLJPRUO2ffR6Is0VMfdlEUXcMIeg3mDq-LyjRlDEi72pUutCcmdM5tYXu4Ck5AB/pubhtml?gid=1019546511&single=true&widget=true&headers=false">
    </iframe>
  </div>

</body>
</html>
